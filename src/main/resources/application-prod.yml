spring:
  data:
    mongodb:
      # En producción tomará la URL de la variable de entorno MONGO_URI, con fallback local
      uri: ${MONGO_URI:mongodb://localhost:27017/workflow}
      auto-index-creation: false
      # Configuración del pool de conexiones para entornos serverless auto-escalables
      option:
        min-connections-per-host: 2
        max-connections-per-host: 25
        max-connection-idle-time: 30000
        connect-timeout: 5000

  ai:
    vertex:
      ai:
        gemini:
          project-id: ${GCP_PROJECT_ID:}
          location: us-central1
          chat:
              options:
                model: gemini-2.5-flash
                temperature: 0.1

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    com.workflow: INFO

app:
  uploads:
    dir: /tmp/uploads
  gcp:
    bucket-name: ${GCS_BUCKET_NAME:parcial-2-software-bucket}
  aws:
    s3:
      bucket-name: ${AWS_S3_BUCKET_NAME:parcial-bucket-segundo}
      region: ${AWS_REGION:us-east-2}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  firebase:
    project-id: ${FIREBASE_PROJECT_ID:}
    # credentials-path se omite en Cloud Run; Google ADC lo detecta automáticamente.
